id: task_005_web_research
name: Live web research comparison task
category: web_research
description: Research a live topic across multiple sources and answer three questions.
timeout_sec: 1800
nondeterministic: true
allowed_tools:
  - list_files
  - read_file
  - web_search
  - open_url
  - write_file
single_strategy:
  enabled: true
  temperature: 0.2
  max_steps: 48
multi_strategy:
  enabled: true
  temperature: 0.2
  max_steps: 48
  architecture:
    type: pipeline
    agents:
      - id: researcher
        role: Gather the best sources and extract evidence.
        allowed_tools: [list_files, read_file, web_search, open_url]
      - id: writer
        role: Answer the questions clearly with cited source notes and save a structured artifact.
        allowed_tools: [read_file, write_file]
      - id: reviewer
        role: Check whether the answer covers all questions, uses multiple sources, and states uncertainty.
        allowed_tools: [read_file, open_url]
    flow: [researcher, writer, reviewer]
router_strategy:
  enabled: true
  route_candidates: [single, multi]
