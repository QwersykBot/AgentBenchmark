id: task_006_fake_email
name: Fake email workflow
category: workflow
description: Read fake inbox messages and draft replies as artifacts instead of sending real emails.
timeout_sec: 1800
allowed_tools:
  - list_files
  - read_file
  - list_emails
  - get_email
  - send_reply
  - write_file
single_strategy:
  enabled: true
  temperature: 0.2
  max_steps: 48
multi_strategy:
  enabled: true
  temperature: 0.2
  max_steps: 48
  architecture:
    type: pipeline
    agents:
      - id: triage
        role: Review the inbox and determine which emails need a reply.
        allowed_tools: [list_files, read_file, list_emails, get_email]
      - id: responder
        role: Draft the reply artifacts for the selected emails.
        allowed_tools: [read_file, get_email, send_reply, write_file]
      - id: reviewer
        role: Check the drafts for tone and completeness.
        allowed_tools: [read_file, get_email]
    flow: [triage, responder, reviewer]
router_strategy:
  enabled: true
  route_candidates: [single, multi]
